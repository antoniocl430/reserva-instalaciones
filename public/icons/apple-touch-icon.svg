<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Fondo sólido azul sin transparencias — iOS recorta en círculo -->
  <rect width="512" height="512" fill="#2563eb"/>

  <!-- Raqueta de pádel — mango -->
  <rect x="232" y="310" width="48" height="110" rx="16" ry="16" fill="white"/>

  <!-- Raqueta de pádel — cabeza (forma ovalada) -->
  <ellipse cx="256" cy="240" rx="100" ry="110" fill="white"/>

  <!-- Agujeros decorativos en la cabeza de la raqueta -->
  <ellipse cx="256" cy="210" rx="60" ry="16" fill="#2563eb"/>
  <ellipse cx="256" cy="245" rx="60" ry="16" fill="#2563eb"/>
  <ellipse cx="256" cy="280" rx="60" ry="16" fill="#2563eb"/>

  <!-- Borde interior de la cabeza -->
  <ellipse cx="256" cy="240" rx="100" ry="110" fill="none" stroke="#2563eb" stroke-width="8"/>

  <!-- Pelota pequeña en esquina superior derecha -->
  <circle cx="340" cy="120" r="36" fill="white"/>
  <circle cx="340" cy="120" r="28" fill="#2563eb" fill-opacity="0.15"/>
  <!-- Curva de la pelota -->
  <path d="M316 108 Q340 96 364 108" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>
  <path d="M316 132 Q340 144 364 132" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>
</svg>
