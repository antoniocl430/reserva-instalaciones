name = "reserva-instalaciones"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[triggers]
crons = ["*/15 * * * *"]

[[r2_buckets]]
binding = "AVATARS_BUCKET"
bucket_name = "reserva-avatares"
jurisdiction = "eu"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
